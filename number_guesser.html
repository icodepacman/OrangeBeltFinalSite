<!DOCTYPE html>
    <head>
        <title>Number Guessing Game</title>
        
        <style>
            html {
            font-family: sans-serif;
            }
            
            body {
            width: 50%;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            background-image: linear-gradient(to bottom, rgb(0, 136, 255),red);
            background-repeat: no-repeat;
        }
        
        </style>
    </head>
    
    <body>
        <h1>Guess The Number</h1>
        
        <p>We have selected a random number between 1 - 10.
        See if you can guess it.</p>
        
        <div class="form">
        <label for="guessField">Enter a guess: </label>
        <input type="text" id="guessField" class="guessField">
        <input type="submit" value="Submit guess" class="guessSubmit" id="submitguess">
        </div>
        <script type="text/Javascript">
        //1.  add the script tag that will tell the browser we are going to use Javascript.
        
        
        // 2. Create a variable named y and assign the following value:  Math.floor(Math.random() * 10 + 1)
        var answer = Math.floor(Math.random() * 10 + 1);
        
        // 3. create one more variable that will keep track of the number of guesses. Name it guess and set the value to 1.
        var guessCount = 1;
        
        //4. add the following line of code:
        document.getElementById("submitguess").onclick = function () {
            var guess = document.getElementById("guessField").value;
            if (guess==answer)
            {
                alert("congrats ");
            }     
            else if(guess < answer) {
                alert("too low!");
            }
            else if(guess < answer) {
                alert("too low!");
            }else if(guess > answer) {
                alert("too high!");

            }
        } 
        // 5. Create one more variable that will hold the number guessed by user
        
        //6. Using conditional statements and the lines of code bellow create the logic to check if the user guessed correctly:
        
        //7. Close the script tag.
        </script>
    
    
    
    </body>
</html>
