<!DOCTYPE html><!--It is an "information" to the browser about what document type to expect.//-->
<html lang="en"> <!--  specifies the language code of the page meaning en or English is used for all the text on the page //-->
<head>
  <link href="clockstyles.css" rel="stylesheet"> <!--linking the stysheet//-->
  <script defer src="clockscript.js"></script> <!--linking the JavaScript file//-->
  <title>Clock</title>
</head>




<body>
  <div class="clock">
    <div class="hand hour" data-hour-hand></div> <!--defining the hands of the clock- HOUR//-->
    <div class="hand minute" data-minute-hand></div><!--defining the hands of the clock- MINIUTE//-->
    <div class="hand second" data-second-hand></div><!--defining the hands of the clock- SECONDS//-->
    <div class="number number1">1</div><!--defining the numbers for the clock//-->
    <div class="number number2">2</div>
    <div class="number number3">3</div>
    <div class="number number4">4</div>
    <div class="number number5">5</div>
    <div class="number number6">6</div>
    <div class="number number7">7</div>
    <div class="number number8">8</div>
    <div class="number number9">9</div>
    <div class="number number10">10</div>
    <div class="number number11">11</div>
    <div class="number number12">12</div>
  </div>
</body>
</html>
