<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="./style.css">

</head>
<body>
    <div class="game-container">
    <header>
        <h1>Rock-Paper-Scissors</h1>
    </header>

<!--make sure to give spans an id!-->
    <div class="scoreboard">
        <h2>Scoreboard</h2>
        <div class="score">
            <p>Player: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
    <!--text for computer (use a span for the score)-->
        </div>
    </div>

    <div class="match">
        <div class="hand" id="player-hand">
            <img src="./images/default.jpg" alt="RockPaperScissors Image">
        </div>
        <div class="hand" id="computer-hand">
            <img src="./images/default.jpg" alt="RockPaperScissors Image">
        </div>
    </div>

    <div class="result">
        <p>Choose Your Weapon!</p>
    </div>
    
    <div class="options">
        <button class = "choice-btn" data-choice="rock">Rock</button> 
        <button class = "choice-btn" data-choice="paper">paper</button>
        <button class = "choice-btn"data-choice="scissors">scissors</button>
    </div>
</div>

<script src="./script.js"></script>

</body>
</html>
